<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0b3d2e" />
<title>FAM STORE</title>
<!-- FAMSTORE web v1 — single file. React UMD via CDN, app logic precompiled (no Babel). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root{
  --bg:#eef1f4; --surface:#ffffff; --surface-2:#f7f9fb;
  --ink:#13202b; --muted:#64748b; --line:#e2e8ef;
  --brand:#0b3d2e; --brand-2:#0e7a5f; --brand-soft:#e6f4ee;
  --gold:#b88a2e; --gold-soft:#fbf2dd;
  --pos:#0e7a5f; --neg:#c0392b; --neg-soft:#fdecea;
  --usd:#1f6feb; --usd-soft:#e9f1ff;
  --shadow:0 1px 2px rgba(16,40,30,.06),0 8px 24px rgba(16,40,30,.06);
  --r:16px; --r-sm:11px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Cairo',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";letter-spacing:-.2px;direction:ltr;unicode-bidi:plaintext;display:inline-block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#cdd6df;border-radius:8px}

/* ---------- App shell ---------- */
.app{max-width:540px;margin:0 auto;min-height:100dvh;background:var(--bg);position:relative;padding-bottom:78px}
.topbar{position:sticky;top:0;z-index:30;background:var(--brand);color:#fff;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;display:flex;align-items:center;gap:12px;
  box-shadow:0 4px 18px rgba(11,61,46,.22)}
.topbar .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#0e7a5f,#0b3d2e);
  display:grid;place-items:center;font-weight:900;font-size:13px;color:#fff;box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.18)}
.topbar h1{font-size:17px;font-weight:800;margin:0;letter-spacing:.3px}
.topbar .sub{font-size:11px;opacity:.7;font-weight:600;margin-top:-2px}
.topbar .spacer{flex:1}
.icon-btn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:rgba(255,255,255,.12);color:#fff;font-size:18px;transition:.15s}
.icon-btn:active{transform:scale(.92)}
.page{padding:14px 14px 20px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Hero box ---------- */
.hero{background:linear-gradient(155deg,#0e6a50 0%,#0b3d2e 95%);color:#fff;border-radius:20px;padding:18px;position:relative;overflow:hidden;box-shadow:0 12px 28px rgba(11,61,46,.28)}
.hero::after{content:"";position:absolute;left:-30px;top:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(255,255,255,.10),transparent 70%)}
.hero .label{font-size:12px;font-weight:700;opacity:.8;display:flex;align-items:center;gap:6px}
.hero .row{display:flex;gap:12px;margin-top:10px}
.hero .cell{flex:1;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:12px}
.hero .cell .cap{font-size:11px;opacity:.78;font-weight:600}
.hero .cell .val{font-size:21px;font-weight:800;margin-top:3px}
.hero .cell .unit{font-size:11px;opacity:.7;font-weight:600}
.hero .strip{display:flex;gap:14px;margin-top:12px;font-size:11.5px;font-weight:600;opacity:.9;flex-wrap:wrap}
.hero .strip b{font-weight:800}
.chip-in{color:#a8f0cf}.chip-out{color:#ffc9bf}

/* ---------- Dashboard grid ---------- */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px;text-align:right;box-shadow:var(--shadow);transition:.15s;display:flex;flex-direction:column;gap:7px;min-height:96px}
.tile:active{transform:scale(.975)}
.tile .ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:18px;background:var(--brand-soft);color:var(--brand-2)}
.tile .t{font-size:13.5px;font-weight:800}
.tile .meta{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:auto}
.tile .meta b{color:var(--ink);font-weight:800}
.tile.full{grid-column:1/-1;min-height:auto;flex-direction:row;align-items:center;gap:11px}
.tile.full .ico{background:var(--gold-soft);color:var(--gold)}

/* ---------- Section / cards ---------- */
.sec-h{display:flex;align-items:center;gap:8px;margin:18px 2px 9px}
.sec-h .bar{width:4px;height:17px;border-radius:3px;background:var(--brand-2)}
.sec-h h2{font-size:15px;font-weight:800;margin:0}
.sec-h .right{margin-inline-start:auto;font-size:12px;color:var(--muted);font-weight:600}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
.card+.card{margin-top:11px}

/* ---------- Forms ---------- */
.field{margin-bottom:11px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
.field .in,.field input,.field select,.field textarea{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2);font-weight:600;color:var(--ink);transition:.15s;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand-2);background:#fff;box-shadow:0 0 0 4px var(--brand-soft)}
.field input.money{direction:ltr;text-align:right;font-variant-numeric:tabular-nums}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:13px;border-radius:var(--r-sm);font-weight:800;font-size:15px;transition:.15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--brand-2);color:#fff;box-shadow:0 6px 16px rgba(14,122,95,.28)}
.btn-dark{background:var(--brand);color:#fff}
.btn-gold{background:var(--gold);color:#fff}
.btn-ghost{background:var(--surface-2);color:var(--ink);border:1.5px solid var(--line)}
.btn-danger{background:var(--neg-soft);color:var(--neg)}
.btn-sm{padding:9px 12px;font-size:13px;width:auto;border-radius:9px}
.btn-row{display:flex;gap:9px;margin-top:4px}

/* ---------- Toggle pills (IN/OUT etc) ---------- */
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{flex:1;min-width:0;padding:11px 8px;border-radius:11px;border:1.5px solid var(--line);background:var(--surface-2);font-weight:800;font-size:13px;text-align:center;transition:.15s;white-space:nowrap}
.pill.on-in{background:var(--brand-soft);border-color:var(--brand-2);color:var(--brand-2)}
.pill.on-out{background:var(--neg-soft);border-color:var(--neg);color:var(--neg)}
.pill.on-usd{background:var(--usd-soft);border-color:var(--usd);color:var(--usd)}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:6px;background:var(--surface-2);border:1px solid var(--line);padding:4px;border-radius:13px;margin-bottom:13px;overflow-x:auto}
.tabs button{flex:1;padding:9px 10px;border-radius:10px;font-weight:800;font-size:13px;color:var(--muted);white-space:nowrap;transition:.15s}
.tabs button.active{background:var(--surface);color:var(--brand);box-shadow:var(--shadow)}

/* ---------- List rows ---------- */
.list{display:flex;flex-direction:column;gap:8px}
.row-item{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px 13px;display:flex;align-items:center;gap:11px;box-shadow:var(--shadow)}
.row-item .av{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-weight:800;font-size:13px;flex-shrink:0}
.row-item .main{flex:1;min-width:0}
.row-item .main .nm{font-weight:800;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-item .main .sb{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px}
.row-item .amt{text-align:left;font-weight:800;font-size:14px;flex-shrink:0}
.row-item .amt .s{font-size:10.5px;font-weight:600;color:var(--muted)}
.tag{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px}
.t-in{background:var(--brand-soft);color:var(--brand-2)}
.t-out{background:var(--neg-soft);color:var(--neg)}
.t-usd{background:var(--usd-soft);color:var(--usd)}
.empty{text-align:center;color:var(--muted);font-weight:600;font-size:13px;padding:30px 16px}
.empty .e-ic{font-size:34px;opacity:.5;margin-bottom:8px}

/* summary stat row */
.stats{display:flex;gap:9px;margin-bottom:13px}
.stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px;text-align:center;box-shadow:var(--shadow)}
.stat .v{font-size:17px;font-weight:800}
.stat .k{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}
.pos{color:var(--pos)}.neg{color:var(--neg)}.usd{color:var(--usd)}

/* ---------- Bottom nav ---------- */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:40;max-width:540px;margin:0 auto;
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  display:flex;padding:6px 6px calc(env(safe-area-inset-bottom) + 6px);gap:2px}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px;border-radius:11px;color:var(--muted);font-size:10.5px;font-weight:700;transition:.15s}
.nav button .ni{font-size:20px;line-height:1}
.nav button.active{color:var(--brand-2)}
.nav button.active .ni{transform:translateY(-1px)}

/* ---------- Modal ---------- */
.ov{position:fixed;inset:0;z-index:60;background:rgba(10,22,18,.5);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
.sheet{width:100%;max-width:540px;background:var(--surface);border-radius:22px 22px 0 0;padding:8px 16px calc(env(safe-area-inset-bottom) + 18px);max-height:90dvh;overflow:auto;animation:up .28s cubic-bezier(.2,.9,.3,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet .grip{width:38px;height:4px;border-radius:3px;background:var(--line);margin:6px auto 12px}
.sheet h3{font-size:17px;font-weight:800;margin:0 0 4px}
.sheet .desc{font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:14px}

/* login */
.login{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:28px;background:linear-gradient(165deg,#0e6a50,#082a1f)}
.login .brand{text-align:center;color:#fff;margin-bottom:26px}
.login .brand .mk{width:74px;height:74px;border-radius:20px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);display:grid;place-items:center;margin:0 auto 14px;font-weight:900;font-size:24px;letter-spacing:1px}
.login .brand h1{font-size:26px;font-weight:900;margin:0;letter-spacing:1px}
.login .brand p{opacity:.7;font-weight:600;font-size:13px;margin:4px 0 0}
.login .box{background:rgba(255,255,255,.97);border-radius:20px;padding:20px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);z-index:80;background:var(--ink);color:#fff;
  padding:11px 18px;border-radius:30px;font-weight:700;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:up .25s;max-width:90%}
.muted{color:var(--muted)} .center{text-align:center}
.hint{font-size:11px;color:var(--muted);font-weight:600;text-align:center;margin-top:14px}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
.kv:last-child{border:none}
.kv .k{color:var(--muted);font-weight:700}
.kv .v{font-weight:800}
.badge-net{padding:13px;border-radius:13px;text-align:center;font-weight:800;margin-top:8px}

/* ============ v2: dashboard, confirm/detail, responsive ============ */
.tappable{cursor:pointer}
.row-item.tappable:active{transform:scale(.99)}
.tag{margin-inline-start:6px}
.err{color:var(--neg);font-weight:700;font-size:13px;margin:2px 0 10px}
.money.ro{background:#eef4f1;color:var(--brand-2);font-weight:800}
.inline-in,.search-in,.calc-in{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface-2);font-weight:600;color:var(--ink);outline:none}
.search-in{background:#fff}
.inline-in{flex:1;padding:10px 12px;border-radius:9px}
.calc-in{flex:1;padding:12px 13px;border-radius:9px;font-weight:700;text-align:right;direction:ltr}
.x-btn{color:var(--neg);font-weight:800;font-size:18px;padding:0 6px}
.total-row{border-top:2px solid var(--brand)!important;margin-top:4px;padding-top:10px!important}
.total-row .k{color:var(--ink);font-weight:800}
.big-green{font-size:18px;color:var(--brand-2)}
.badge-net.brand{background:var(--brand-soft);color:var(--brand-2)}
.badge-net.usd-bg{background:var(--usd-soft);color:var(--usd)}
.amber-t{color:var(--gold)}
.sec-h.tight{margin:0 0 8px}
.sec-h .right{cursor:pointer}
.bar.amber{background:var(--gold)}
.btn-danger-solid{background:var(--neg);color:#fff;box-shadow:0 6px 16px rgba(192,57,43,.25)}

/* confirm / detail sheets */
.confirm-box{background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:6px 14px}
.confirm-line{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line)}
.confirm-line:last-child{border:none}
.cl-k{color:var(--muted);font-weight:700;font-size:13.5px}
.cl-v{font-weight:800;font-size:15px}

/* hero tweaks */
.hero.compact{padding:14px}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.clock{text-align:left;flex-shrink:0}
.clk-time{font-size:19px;font-weight:800;line-height:1;letter-spacing:-.3px}
.clk-s{font-size:11px;opacity:.7;font-weight:600}
.clk-date{font-size:10.5px;opacity:.78;font-weight:600;margin-top:3px}

/* topbar title + desktop nav */
.tb-title{min-width:0}
.topnav{display:none}

/* dashboard layout (mobile: stacked) */
.page-dash{padding:14px 14px 20px}
.dash{display:flex;flex-direction:column;gap:12px}
.dash .card{margin:0}

/* stats + chart */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
.mini{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:11px;text-align:center}
.mini .mv{font-size:17px;font-weight:800}
.mini .mk{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}
.chart{background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:12px}
.chart-cap{font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:10px}
.bars{display:flex;align-items:flex-end;justify-content:space-between;gap:6px;height:96px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.bar-fill{width:100%;max-width:30px;background:linear-gradient(180deg,#13a37a,#0b6e4f);border-radius:6px 6px 3px 3px;position:relative;display:flex;justify-content:center;min-height:4px;transition:height .3s}
.bar-val{position:absolute;top:-15px;font-size:9.5px;font-weight:800;color:var(--brand-2);white-space:nowrap}
.bar-lbl{font-size:10px;color:var(--muted);font-weight:700}

/* alerts */
.alert-sub{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:7px}
.alert-sub .dot{width:8px;height:8px;border-radius:50%}
.dot.neg{background:var(--neg)}.dot.amber{background:var(--gold)}
.alert-empty{font-size:12.5px;color:var(--muted);font-weight:600;padding:3px 0 6px}
.alert-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:var(--surface-2);margin-bottom:6px;cursor:pointer}
.alert-row:active{transform:scale(.99)}
.ar-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ar-amt{font-size:12.5px;font-weight:800;flex-shrink:0}

/* feed */
.feed-card{display:flex;flex-direction:column}
.feed{display:flex;flex-direction:column;gap:7px}
.feed-item{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line)}
.feed-item:last-child{border:none}
.feed-item:active{background:var(--surface-2)}
.fi-ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:13px;flex-shrink:0}
.fi-main{flex:1;min-width:0}
.fi-t{font-size:13px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi-s{font-size:11px;color:var(--muted);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:rtl}
.fi-time{font-size:10.5px;color:var(--muted);font-weight:700;flex-shrink:0;white-space:nowrap}

/* shortcuts */
.shortcuts{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sc{display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 4px;background:var(--surface);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);transition:.15s}
.sc:active{transform:scale(.94)}
.sc-ic{font-size:21px;line-height:1}
.sc-lb{font-size:10.5px;font-weight:700;color:var(--muted)}

/* invoice head */
.inv-head{background:var(--brand);color:#fff;border:none}
.ih-row{display:flex;justify-content:space-between;align-items:center}
.ih-name{font-size:18px;font-weight:900}
.ih-sub{font-size:11px;opacity:.8}
.ih-no{text-align:left}
.ih-k{font-size:10px;opacity:.7}
.ih-v{font-weight:800;font-size:13px}

/* ============ DESKTOP ============ */
@media (min-width:860px){
  .app{max-width:1120px;padding-bottom:26px}
  .nav{display:none}
  .topbar{padding:14px 22px}
  .topnav{display:flex;gap:3px;margin-inline-start:14px;flex-wrap:wrap;flex:1}
  .topnav .tn{padding:8px 12px;border-radius:9px;font-weight:700;font-size:13px;color:rgba(255,255,255,.78);transition:.15s}
  .topnav .tn:hover{background:rgba(255,255,255,.10);color:#fff}
  .topnav .tn.active{background:rgba(255,255,255,.16);color:#fff}
  .tb-title h1{font-size:18px;white-space:nowrap}
  .spacer{display:none}

  /* non-dash pages: centered readable column */
  .page{max-width:680px;margin:0 auto}
  .page-dash{max-width:none;padding:18px 22px}

  /* dashboard grid per sketch: hero full, feed right (tall), alerts+stats left */
  .dash{display:grid;grid-template-columns:380px minmax(0,1fr);gap:16px;align-items:start}
  .d-hero{grid-column:1 / -1;grid-row:1}
  .d-feed{grid-column:1;grid-row:2 / 6}
  .d-alerts{grid-column:2;grid-row:2}
  .d-stats{grid-column:2;grid-row:3}
  .d-short{grid-column:2;grid-row:4}
  .d-feed .feed{max-height:68vh;overflow:auto;padding-inline-end:4px}
  .stat-grid{grid-template-columns:repeat(4,1fr)}
  .shortcuts{grid-template-columns:repeat(10,1fr)}
  .hero .cell .val{font-size:24px}
  .bars{height:120px}
}
@media (min-width:1024px){
  .stat-grid{grid-template-columns:repeat(4,1fr)}
}


/* ============ v3: stepper, services, statement, whatsapp, print ============ */
.stock-now{font-size:12.5px;font-weight:700;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:8px 11px;margin-bottom:11px}
.stock-now b{color:var(--ink)}
.stepper{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:11px;overflow:hidden;background:#fff}
.stepper button{width:40px;height:46px;font-size:22px;font-weight:800;color:var(--brand-2);background:var(--surface-2);border:none;flex-shrink:0}
.stepper button:active{background:var(--brand-soft)}
.step-in{flex:1;border:none!important;text-align:center;font-weight:800;font-size:20px;font-variant-numeric:tabular-nums;background:#fff;outline:none;min-width:0;width:100%;color:var(--ink)}

.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}

.svc-ic{font-size:32px;line-height:1}
.svc-nm{font-size:15px;font-weight:800;color:var(--ink)}
.svc-bal{font-size:13px;font-weight:700;color:var(--brand-2)}

.wa-text{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:12px;background:var(--surface-2);font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);outline:none;resize:vertical;line-height:1.7;direction:rtl}
.wa-text:focus{border-color:var(--brand)}
.btn-wa{background:#25D366;color:#fff;box-shadow:0 6px 16px rgba(37,211,102,.3)}
.chev{font-size:20px;color:#c2ccc6;font-weight:800;margin-inline-start:2px;line-height:1}

/* print system (portaled to body) */
.print-root{display:none}
.print-close{position:fixed;top:12px;left:12px;background:#c0392b;color:#fff;padding:8px 14px;border-radius:20px;font-weight:700;font-size:13px;z-index:99999;cursor:pointer}
@media print{
  @page{margin:12mm}
  html,body{background:#fff!important}
  #root{display:none!important}
  .print-root{display:block!important;position:static!important}
  .print-close,.no-print{display:none!important}
}
@media (min-width:860px){
  .svc-grid{grid-template-columns:repeat(4,1fr)}
}

.img-pick{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.img-prev{width:62px;height:62px;border-radius:12px;object-fit:cover;border:1px solid var(--line)}

.svc-wrap{position:relative}

.pk-card:active{transform:scale(.97)}
.pk-img{width:54px;height:54px;border-radius:12px;overflow:hidden;display:grid;place-items:center;background:var(--surface-2);font-size:26px}
.pk-img img{width:100%;height:100%;object-fit:cover}

.pk-pr{font-size:10.5px;color:var(--muted);font-weight:600}

.ov{align-items:center;overflow-y:auto;padding:18px 12px}
.sheet{border-radius:20px;max-height:86vh;max-height:86dvh;padding:18px 18px 20px;animation:pop .2s ease}

.scan-modal{position:fixed;inset:0;z-index:120;background:rgba(8,18,14,.97);display:flex;flex-direction:column;animation:fade .2s ease}

.scan-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:14px;overflow-y:auto}
.scan-view{width:100%;max-width:400px;border-radius:18px;overflow:hidden;background:#000;box-shadow:0 10px 34px rgba(0,0,0,.45);position:relative;aspect-ratio:1/1}

@keyframes laser{0%,100%{top:20%}50%{top:78%}}
.scan-hint{color:#cfe9dd;font-weight:700;font-size:13.5px;text-align:center;max-width:380px}
.scan-err{color:#ffd2c9;font-weight:700;font-size:14px;line-height:1.6;text-align:center;background:rgba(192,57,43,.18);border:1px solid rgba(255,120,100,.32);padding:16px 18px;border-radius:14px;max-width:380px}
.scan-manual{display:flex;gap:8px;width:100%;max-width:400px;margin-top:2px}
.scan-manual input{flex:1;padding:13px 14px;border-radius:12px;border:1.5px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:#fff;font-weight:700;font-size:16px;outline:none;direction:ltr;text-align:right}

.scan-head-actions{display:flex;align-items:center;gap:8px}
.scan-x.on{background:#27e08c;color:#08120e}

.scan-zoom>span{font-size:18px;opacity:.85;flex-shrink:0}
.scan-zoom b{font-size:13px;min-width:42px;text-align:center;color:#a8f0cf;flex-shrink:0;direction:ltr}
.scan-zoom input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;background:rgba(255,255,255,.22);outline:none;margin:0}
